services:
  postgres:
    image: postgres:16-alpine
    container_name: icps_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: icps
      POSTGRES_PASSWORD: icps_secret
      POSTGRES_DB: icps_master
    ports:
      - "5434:5432"
    volumes:
      - icps_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  icps_pgdata:
